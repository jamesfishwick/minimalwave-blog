name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Job 1: Validation and Testing (runs on all pushes/PRs)
  validate-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: minimalwave_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          poetry --version

      - name: Cache Poetry dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          # Check if lock file is up to date, regenerate if needed
          poetry check || poetry lock
          poetry install --no-interaction --no-ansi --no-root

      - name: Lint and format check (ruff)
        run: |
          poetry run ruff check .
          poetry run ruff format --check .

      - name: Set environment variables
        run: |
          echo "DJANGO_SETTINGS_MODULE=minimalwave-blog.settings.development" >> $GITHUB_ENV
          echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
          echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
          echo "POSTGRES_DB=minimalwave_test" >> $GITHUB_ENV
          echo "POSTGRES_USER=postgres" >> $GITHUB_ENV
          echo "POSTGRES_PASSWORD=postgres" >> $GITHUB_ENV

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "✓ PostgreSQL is ready"

      - name: Validate migration consistency
        run: |
          echo "🔍 Validating migration dependencies and consistency..."
          poetry run python manage.py validate_migrations
          echo "✓ Migration validation passed"

      - name: Check for pending migrations
        run: |
          echo "📋 Checking for uncommitted model changes..."
          poetry run python manage.py makemigrations --check --dry-run
          echo "✓ No pending migrations"

      - name: Run Django system checks
        run: |
          echo "🔍 Running Django deployment checks..."
          poetry run python manage.py check --deploy
          echo "✓ System checks passed"

      - name: Test migrations in clean environment
        run: |
          echo "🧪 Testing migrations from scratch..."
          poetry run python manage.py migrate --verbosity=2
          poetry run python manage.py migrate --check
          echo "✓ Migrations applied successfully"

      - name: Verify database schema
        run: |
          echo "📊 Verifying database schema..."
          poetry run python manage.py showmigrations --verbosity=2
          echo "✓ Database schema verified"

      - name: Run test suite
        run: |
          echo "🧪 Running Django tests..."
          poetry run python manage.py test --verbosity=2
          echo "✓ All tests passed"

  # Job 2: Build and Deploy (only on push to main)
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: validate-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and Push Docker Image
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Docker image
        run: |
          echo "🐳 Building Docker image..."
          docker buildx build --platform linux/amd64 \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:${{ github.sha }} \
            -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:latest \
            --build-arg DJANGO_SETTINGS_MODULE=minimalwave-blog.settings.production \
            -f deploy/docker/Dockerfile .
          echo "✓ Docker image built"

      - name: Push Docker image
        run: |
          echo "📤 Pushing Docker image to registry..."
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:latest
          echo "✓ Docker image pushed"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'minimalwave-blog'
          images: '${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:${{ github.sha }}'

      - name: Restart App Service
        run: |
          echo "🔄 Restarting Azure App Service..."
          az webapp restart --name minimalwave-blog --resource-group minimalwave-blog-rg
          echo "✓ App Service restarted"

      - name: Wait for app to be ready
        run: |
          # The App Service cold-boots after restart: the entrypoint runs
          # collectstatic + migrate before gunicorn accepts traffic. Poll the
          # homepage until it responds instead of guessing with a fixed sleep.
          echo "⏳ Waiting for the app to become ready..."
          for i in $(seq 1 30); do
            if curl -f -s -o /dev/null --max-time 30 https://jamesfishwick.com/; then
              echo "✓ App is ready (after ~$((i * 10))s)"
              exit 0
            fi
            echo "  not ready yet (attempt $i/30); waiting 10s..."
            sleep 10
          done
          echo "❌ App did not become ready within ~5 minutes"
          exit 1

      - name: Smoke tests
        run: |
          # Each check retries: a single cold request can still be slow right
          # after the readiness gate, so don't fail on one timeout.
          smoke() {
            local name="$1" url="$2"
            for i in $(seq 1 5); do
              if curl -f -s -o /dev/null --max-time 30 "$url"; then
                echo "✓ $name OK"
                return 0
              fi
              echo "  $name attempt $i/5 failed; retrying in 10s..."
              sleep 10
            done
            echo "❌ $name failed after 5 attempts: $url"
            return 1
          }
          smoke "Homepage" "https://jamesfishwick.com/"
          smoke "Blog post" "https://jamesfishwick.com/2025/jul/2/model-autophagy-disorder-ai-will-eat-itself/"
          smoke "Admin" "https://jamesfishwick.com/admin/"
          smoke "Projects" "https://jamesfishwick.com/projects/"

      - name: Deployment summary
        run: |
          echo "=================================="
          echo "✅ Deployment Successful!"
          echo "=================================="
          echo "Image: ${{ secrets.REGISTRY_LOGIN_SERVER }}/minimalwave-blog:${{ github.sha }}"
          echo "Site: https://jamesfishwick.com"
          echo "Commit: ${{ github.sha }}"
          echo "=================================="

      - name: Azure Logout
        if: always()
        run: az logout
