# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # Built-in hooks for basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '^.*\.md$'  # Allow trailing whitespace in markdown
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-json
      - id: pretty-format-json
        args: ['--autofix']

  # Python linting + import sorting + formatting with Ruff
  # (replaces black + isort + flake8; config lives in pyproject.toml)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # Django-specific checks (consolidated)
  - repo: local
    hooks:
      - id: migration-safety
        name: Migration Safety Check
        entry: scripts/migration-safety.sh
        args: ['--validate']
        language: script
        files: '(models\.py|migrations/.*\.py)$'
        pass_filenames: false

      - id: migration-clean-test
        name: Test Migrations in Clean Environment
        entry: scripts/migration-safety.sh
        args: ['--test-clean']
        language: script
        files: '(models\.py|migrations/.*\.py)$'
        pass_filenames: false
        stages: [pre-push]  # Only run on push, not every commit

      - id: django-tests
        name: Run Django Tests
        entry: make
        args: ['test-in-docker']
        language: system
        pass_filenames: false
        stages: [pre-push]  # Only run on push, not every commit

  # Security checks with bandit
  - repo: https://github.com/pycqa/bandit
    rev: '1.7.8'
    hooks:
      - id: bandit
        args: ['-r', '.', '-f', 'json']
        files: '\.py$'
        exclude: '^(tests?/|.*/tests?/)'

# Configuration for specific tools
default_language_version:
  python: python3

# Skip certain hooks for specific file patterns
exclude: |
  (?x)(
    ^venv/|
    ^\.venv/|
    ^migrations/|
    ^logs/|
    ^\.claude-sandbox/|
    ^staticfiles/
  )